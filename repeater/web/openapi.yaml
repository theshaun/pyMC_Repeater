openapi: 3.0.0
info:
  title: pyMC Repeater API
  description: |
    REST API for pyMC Repeater - LoRa mesh network repeater with room server functionality.

    ## Features
    - System statistics and monitoring
    - Packet history and analysis
    - Identity management
    - Access Control Lists (ACL)
    - Room server messaging
    - CAD calibration
    - Noise floor monitoring
  version: 1.0.0
  contact:
    name: pyMC Repeater
    url: https://github.com/rightup/pyMC_Repeater

servers:
  - url: /api
    description: Current server (relative URLs with /api prefix)
  - url: /
    description: Current server root (for /auth endpoints)
  - url: http://localhost:8080/api
    description: Local development server
  - url: http://{host}:8080/api
    description: Custom host
    variables:
      host:
        default: localhost
        description: Repeater IP address or hostname

tags:
  - name: Authentication
    description: User authentication and API token management
  - name: System
    description: System statistics and control
  - name: GPS
    description: Local GPS receiver diagnostics
  - name: Packets
    description: Packet history and statistics
  - name: Charts
    description: Graph data and RRD metrics
  - name: Noise Floor
    description: Noise floor monitoring
  - name: CAD Calibration
    description: Channel Activity Detection calibration
  - name: Adverts
    description: Advertisement and contact management
  - name: Transport Keys
    description: Transport encryption key management
  - name: Network Policy
    description: Network flood policy and neighbor management
  - name: Identities
    description: Identity management
  - name: ACL
    description: Access Control Lists
  - name: Room Server
    description: Room server messaging

paths:
  # ============================================================================
  # Authentication Endpoints
  # ============================================================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate with username/password and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, client_id]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: admin123
                client_id:
                  type: string
                  description: Unique client identifier
                  example: web-client-abc123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                    description: JWT token
                  expires_in:
                    type: integer
                    description: Token expiry in seconds
                  username:
                    type: string
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      description: Extend session by refreshing JWT token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                  expires_in:
                    type: integer
                  username:
                    type: string

  /auth/verify:
    get:
      tags: [Authentication]
      summary: Verify authentication
      description: Check if current authentication is valid
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: Authentication valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  authenticated:
                    type: boolean
                  user:
                    type: object

  /auth/change_password:
    post:
      tags: [Authentication]
      summary: Change admin password
      description: Change the admin password (requires authentication)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Password changed successfully
        '401':
          description: Current password incorrect
        '400':
          description: Invalid password format

  /auth/tokens:
    get:
      tags: [Authentication]
      summary: List API tokens
      description: Get list of all API tokens (RESTful endpoint)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: List of tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tokens:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        last_used:
                          type: string
                          format: date-time
    post:
      tags: [Authentication]
      summary: Create API token
      description: Generate a new API token (RESTful endpoint)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Friendly name for the token
                  example: "My API Token"
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                    description: The plaintext token (only shown once)
                  token_id:
                    type: integer
                  name:
                    type: string
                  warning:
                    type: string

  /auth/tokens/{token_id}:
    delete:
      tags: [Authentication]
      summary: Revoke API token
      description: Delete/revoke an API token by ID (RESTful endpoint)
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Token revoked
        '404':
          description: Token not found

  # ============================================================================
  # System Endpoints
  # ============================================================================
  /stats:
    get:
      tags: [System]
      summary: Get system statistics
      description: Returns repeater uptime, packet counts, and version information
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  uptime_secs:
                    type: integer
                    example: 3600
                  packets_received:
                    type: integer
                    example: 150
                  packets_sent:
                    type: integer
                    example: 120
                  version:
                    type: string
                    example: "1.0.0"
                  core_version:
                    type: string
                    example: "0.5.0"

  /gps:
    get:
      tags: [GPS]
      summary: Get local GPS diagnostics
      description: Returns parsed NMEA fix, position, motion, accuracy, satellites, and raw sentence health.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: GPS diagnostics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      running:
                        type: boolean
                      status:
                        type: object
                      fix:
                        type: object
                      position:
                        type: object
                        description: Effective receiver position for API clients
                      gps_position:
                        type: object
                        description: Raw position reported by the GPS receiver, even before a valid fix
                      manual_position:
                        type: object
                        nullable: true
                        description: Configured repeater latitude/longitude, when set to a non-zero coordinate
                      position_meta:
                        type: object
                        properties:
                          source:
                            type: string
                            enum: [gps, manual_config]
                          source_label:
                            type: string
                          policy:
                            type: string
                            enum: [manual_until_gps_fix, gps_only]
                          manual_config_available:
                            type: boolean
                          gps_fix_valid:
                            type: boolean
                      motion:
                        type: object
                      accuracy:
                        type: object
                      time:
                        type: object
                      time_sync:
                        type: object
                        description: GPS-to-system-clock sync status
                        properties:
                          enabled:
                            type: boolean
                          state:
                            type: string
                            enum: [disabled, waiting_for_fix, waiting_for_time, ready, in_sync, synced, error, ignored]
                          last_attempt:
                            type: string
                            nullable: true
                          last_success:
                            type: string
                            nullable: true
                          last_error:
                            type: string
                            nullable: true
                          last_gps_time:
                            type: string
                            nullable: true
                          last_offset_seconds:
                            type: number
                            nullable: true
                      location_update:
                        type: object
                        description: GPS-fix-to-repeater-location update status
                        properties:
                          enabled:
                            type: boolean
                          state:
                            type: string
                            enum: [disabled, unconfigured, waiting_for_fix, waiting_for_position, ready, updated, skipped, error]
                          last_attempt:
                            type: string
                            nullable: true
                          last_success:
                            type: string
                            nullable: true
                          last_error:
                            type: string
                            nullable: true
                          last_latitude:
                            type: number
                            nullable: true
                          last_longitude:
                            type: number
                            nullable: true
                      satellites:
                        type: object
                      nmea:
                        type: object
                      raw_attributes:
                        type: object
                        additionalProperties: true

  /gps_stream:
    get:
      tags: [GPS]
      summary: GPS diagnostics SSE stream
      description: Server-Sent Events stream of live GPS diagnostics snapshots.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /send_advert:
    post:
      tags: [System]
      summary: Send repeater advertisement
      description: Manually trigger sending a repeater advertisement packet
      responses:
        '200':
          description: Advertisement sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '405':
          description: Method not allowed

  /logs:
    get:
      tags: [System]
      summary: Get system logs
      description: Retrieve recent system logs
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                type: object
                required: [logs]
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      required: [message, timestamp, level]
                      properties:
                        message:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        level:
                          type: string
                  error:
                    type: string

  /logs_stream:
    get:
      tags: [System]
      summary: Stream system logs
      description: Server-Sent Events stream of live system log entries.
      parameters:
        - name: since_id
          in: query
          required: false
          schema:
            type: integer
          description: Resume the stream after this log entry id.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /hardware_stats:
    get:
      tags: [System]
      summary: Get hardware statistics
      description: CPU, memory, disk usage statistics
      responses:
        '200':
          description: Hardware stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_percent:
                    type: number
                  memory_percent:
                    type: number
                  disk_usage:
                    type: object

  /hardware_processes:
    get:
      tags: [System]
      summary: Get process information
      description: List running processes and their resource usage
      responses:
        '200':
          description: Process list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /restart_service:
    post:
      tags: [System]
      summary: Restart repeater service
      description: Restart the repeater daemon service
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: Service restart initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /validate_config:
    get:
      tags: [System]
      summary: Validate config.yaml before restart
      description: Checks config syntax and required settings for the selected radio type.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                      blocked_restart:
                        type: boolean
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            path:
                              type: string
                            message:
                              type: string
                      warnings:
                        type: array
                        items:
                          type: object
                          properties:
                            path:
                              type: string
                            message:
                              type: string
                      summary:
                        type: object
                        properties:
                          error_count:
                            type: integer
                          warning_count:
                            type: integer
                      config_path:
                        type: string
                      message:
                        type: string

  /openapi:
    get:
      tags: [System]
      summary: Get OpenAPI specification
      description: Returns the OpenAPI/Swagger specification for this API
      responses:
        '200':
          description: OpenAPI spec
          content:
            application/json:
              schema:
                type: object

  /set_mode:
    post:
      tags: [System]
      summary: Set repeater mode
      description: |
        Set TX mode. forward = repeat on; monitor = no repeat but companions/tenants can send;
        no_tx = all transmission disabled (receive-only).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [forward, monitor, no_tx]
                  description: |
                    - forward: Repeat received packets; allow all local TX (default)
                    - monitor: Do not repeat; allow local TX (companions, adverts, etc.)
                    - no_tx: Do not repeat; no local TX (receive-only)
                  example: forward
            examples:
              forward:
                value:
                  mode: forward
              monitor:
                value:
                  mode: monitor
              no_tx:
                value:
                  mode: no_tx
      responses:
        '200':
          description: Mode changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  value:
                    success: true
                    data: "Mode set to forward"
        '400':
          description: Invalid mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /packet_stats:
    get:
      tags: [Packets]
      summary: Get packet statistics
      description: Returns packet counts, types, and routing statistics
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
          description: Time range in hours (1-168 = 1 hour to 1 week)
          example: 24
      responses:
        '200':
          description: Packet statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total_packets:
                        type: integer
                      received:
                        type: integer
                      transmitted:
                        type: integer
                      dropped:
                        type: integer
                      by_type:
                        type: object
                      by_route:
                        type: object

  /set_duty_cycle:
    post:
      tags: [System]
      summary: Set duty cycle
      description: Enable or disable duty cycle limiting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  description: Enable duty cycle limiting
                  example: true
            examples:
              enable:
                value:
                  enabled: true
              disable:
                value:
                  enabled: false
      responses:
        '200':
          description: Duty cycle setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /update_duty_cycle_config:
    post:
      tags: [System]
      summary: Update duty cycle configuration
      description: Update detailed duty cycle timing configuration
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                on_time:
                  type: integer
                  description: ON time in seconds
                off_time:
                  type: integer
                  description: OFF time in seconds
            example:
              enabled: true
              on_time: 300
              off_time: 60
      responses:
        '200':
          description: Duty cycle config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /update_radio_config:
    post:
      tags: [System]
      summary: Update radio configuration
      description: Update LoRa radio parameters
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Radio config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ============================================================================
  # Packet Endpoints
  # ============================================================================
  /recent_packets:
    get:
      tags: [Packets]
      summary: Get recent packets
      description: Retrieve recent packet history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of packets to return
      responses:
        '200':
          description: Recent packets
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object

  /packet_by_hash:
    get:
      tags: [Packets]
      summary: Get packet by hash
      parameters:
        - name: packet_hash
          in: query
          required: true
          schema:
            type: string
          description: Packet hash to lookup
      responses:
        '200':
          description: Packet details

  /packet_type_stats:
    get:
      tags: [Packets]
      summary: Get packet type statistics
      description: Statistics broken down by packet type
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
          description: Time range in hours
      responses:
        '200':
          description: Packet type stats
          content:
            application/json:
              schema:
                type: object

  /route_stats:
    get:
      tags: [Packets]
      summary: Get route statistics
      description: Statistics broken down by route type
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
          description: Time range in hours
      responses:
        '200':
          description: Route stats
          content:
            application/json:
              schema:
                type: object

  /filtered_packets:
    get:
      tags: [Packets]
      summary: Get filtered packets
      description: Retrieve packets filtered by type, route, and timestamp
      parameters:
        - name: type
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 15
          description: Packet type filter
        - name: route
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 3
          description: Route type filter
        - name: start_timestamp
          in: query
          schema:
            type: integer
          description: Start timestamp (Unix)
        - name: end_timestamp
          in: query
          schema:
            type: integer
          description: End timestamp (Unix)
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
          description: Maximum results
      responses:
        '200':
          description: Filtered packets
          content:
            application/json:
              schema:
                type: object

  # ============================================================================
  # Charts & RRD Endpoints
  # ============================================================================
  /rrd_data:
    get:
      tags: [Charts]
      summary: Get RRD time-series data
      description: |
        Retrieve Round-Robin Database metrics for graphing.

        **Note:** This endpoint extracts parameters from the request internally.
        Parameters are handled automatically by the backend.
      responses:
        '200':
          description: RRD time-series data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      start_time:
                        type: integer
                      end_time:
                        type: integer
                      step:
                        type: integer
                      timestamps:
                        type: array
                        items:
                          type: integer
                      metrics:
                        type: object

  /packet_type_graph_data:
    get:
      tags: [Charts]
      summary: Get packet type distribution graph data
      description: Returns bar chart data showing packet counts by type
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
          description: Time range in hours
        - name: resolution
          in: query
          schema:
            type: string
            enum: [average, max, min]
            default: average
        - name: types
          in: query
          schema:
            type: string
            default: all
          description: Comma-separated packet types or 'all'
      responses:
        '200':
          description: Packet type graph data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      start_time:
                        type: integer
                      end_time:
                        type: integer
                      step:
                        type: integer
                      chart_type:
                        type: string
                        example: bar
                      series:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            type:
                              type: string
                            data:
                              type: array
                              items:
                                type: number

  /metrics_graph_data:
    get:
      tags: [Charts]
      summary: Get system metrics graph data
      description: |
        Returns time-series data for system metrics like packet counts, RSSI, SNR, etc.

        Available metrics:
        - rx_count: Received packets
        - tx_count: Transmitted packets
        - drop_count: Dropped packets
        - avg_rssi: Average RSSI (dBm)
        - avg_snr: Average SNR (dB)
        - avg_length: Average packet length
        - avg_score: Average score
        - neighbor_count: Neighbor count
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
          description: Time range in hours
        - name: resolution
          in: query
          schema:
            type: string
            enum: [average, max, min]
            default: average
        - name: metrics
          in: query
          schema:
            type: string
            default: all
          description: Comma-separated metric names or 'all'
          example: "rx_count,tx_count,avg_rssi"
      responses:
        '200':
          description: Metrics graph data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      start_time:
                        type: integer
                      end_time:
                        type: integer
                      step:
                        type: integer
                      timestamps:
                        type: array
                        items:
                          type: integer
                      series:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            type:
                              type: string
                            data:
                              type: array
                              items:
                                type: number

  /noise_floor_history:
    get:
      tags: [Noise Floor]
      summary: Get noise floor history
      description: Retrieve historical noise floor measurements
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
          description: Time range in hours
      responses:
        '200':
          description: Noise floor history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object

  /noise_floor_stats:
    get:
      tags: [Noise Floor]
      summary: Get noise floor statistics
      description: Statistical analysis of noise floor measurements
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
          description: Time range in hours
      responses:
        '200':
          description: Noise floor statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      min:
                        type: number
                      max:
                        type: number
                      avg:
